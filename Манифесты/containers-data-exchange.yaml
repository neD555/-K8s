apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange
  template:
    metadata:
      labels:
        app: data-exchange
    spec:
      containers:
        - name: busybox
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date) hello from busybox" >> /shared/data.txt
                sleep 5
              done
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

        - name: multitool
          image: wbitt/network-multitool
          command:
            - /bin/sh
            - -c
            - "sleep infinity"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

      volumes:
        - name: shared-volume
          emptyDir: {}
