apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv-task2
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/k8s/pv-task2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc-task2
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pv-pvc-data-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pv-pvc-data-exchange
  template:
    metadata:
      labels:
        app: pv-pvc-data-exchange
    spec:
      containers:
        - name: busybox
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date) hello from busybox via pv" >> /shared/data.txt
                sleep 5
              done
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

        - name: multitool
          image: wbitt/network-multitool
          command:
            - /bin/sh
            - -c
            - "sleep infinity"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: local-pvc-task2
