apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-sc-task3
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv-task3
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-sc-task3
  hostPath:
    path: /data/k8s/sc-task3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc-task3
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-sc-task3
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sc-data-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sc-data-exchange
  template:
    metadata:
      labels:
        app: sc-data-exchange
    spec:
      containers:
        - name: busybox
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date) hello from busybox via storageclass" >> /shared/data.txt
                sleep 5
              done
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

        - name: multitool
          image: wbitt/network-multitool
          command:
            - /bin/sh
            - -c
            - "sleep infinity"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared

      volumes:
        - name: shared-volume
          persistentVolumeClaim:
            claimName: local-pvc-task3
